<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zuquix — Bocas del Toro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root {
  --accent: #1ABDA0;
  --accent-dim: rgba(26,189,160,0.12);
  --accent-hover: #17a88d;
  --amber: #F5A623;
  --amber-dim: rgba(245,166,35,0.12);
  --red: #E74C3C;
  --red-dim: rgba(231,76,60,0.12);
  --purple: #8B5CF6;
  --purple-dim: rgba(139,92,246,0.12);
  --blue: #378ADD;
  --blue-dim: rgba(55,138,221,0.12);
  --radius: 10px;
  --radius-lg: 14px;
  --shadow: 0 2px 12px rgba(0,0,0,0.18);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.28);
  --font: 'DM Sans', sans-serif;
  --mono: 'DM Mono', monospace;
  --transition: 0.18s ease;
}
[data-theme="dark"] {
  --bg: #1A1A1A;
  --card: #252525;
  --card2: #2e2e2e;
  --text: #FFFFFF;
  --text2: #AAAAAA;
  --border: #333333;
  --sidebar-bg: #1f1f1f;
  --topbar-bg: rgba(26,26,26,0.95);
  --overlay: rgba(0,0,0,0.7);
  --input-bg: #333;
  --hover-bg: rgba(255,255,255,0.04);
  --row-even: rgba(255,255,255,0.02);
}
[data-theme="light"] {
  --bg: #F5F5F5;
  --card: #FFFFFF;
  --card2: #f0f0f0;
  --text: #1A1A1A;
  --text2: #666666;
  --border: #E5E5E5;
  --sidebar-bg: #ffffff;
  --topbar-bg: rgba(245,245,245,0.95);
  --overlay: rgba(0,0,0,0.45);
  --input-bg: #f5f5f5;
  --hover-bg: rgba(0,0,0,0.03);
  --row-even: rgba(0,0,0,0.02);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 14px; }
body { font-family: var(--font); background: var(--bg); color: var(--text); line-height: 1.5; overflow-x: hidden; transition: background var(--transition), color var(--transition); }
a { color: inherit; text-decoration: none; }
button { font-family: var(--font); cursor: pointer; }
input, select, textarea { font-family: var(--font); }

/* ===== LAYOUT ===== */
.app-layout { display: flex; min-height: 100vh; }

/* SIDEBAR */
.sidebar {
  width: 190px; flex-shrink: 0;
  background: var(--sidebar-bg);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  position: fixed; top: 0; left: 0; bottom: 0; z-index: 100;
  transition: background var(--transition), border-color var(--transition);
}
.sidebar-logo {
  padding: 20px 16px 14px;
  border-bottom: 1px solid var(--border);
}
.sidebar-logo .logo-name { font-size: 1.25rem; font-weight: 700; color: var(--accent); letter-spacing: -0.03em; }
.sidebar-logo .logo-loc { font-size: 0.72rem; color: var(--text2); font-weight: 500; margin-top: 1px; }
.sidebar-nav { flex: 1; overflow-y: auto; padding: 10px 0; }
.nav-section-label { font-size: 0.63rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text2); padding: 12px 16px 5px; opacity: 0.7; }
.nav-item {
  display: flex; align-items: center; gap: 9px;
  padding: 8px 16px; cursor: pointer;
  border-radius: 0; font-size: 0.84rem; font-weight: 500;
  color: var(--text2); transition: all var(--transition);
  position: relative; user-select: none;
}
.nav-item:hover { background: var(--hover-bg); color: var(--text); }
.nav-item.active { color: var(--accent); background: var(--accent-dim); font-weight: 600; }
.nav-item .nav-icon { font-size: 0.9rem; width: 18px; text-align: center; flex-shrink: 0; }
.nav-item .nav-badge {
  margin-left: auto; background: var(--accent); color: #fff;
  font-size: 0.62rem; font-weight: 700; min-width: 18px; height: 18px;
  border-radius: 9px; display: flex; align-items: center; justify-content: center; padding: 0 5px;
}
.nav-item .nav-badge.red { background: var(--red); }
.nav-item .nav-badge.amber { background: var(--amber); color: #1a1a1a; }
.nav-ota-toggle { margin-left: auto; }
.sidebar-user {
  padding: 14px 16px; border-top: 1px solid var(--border);
  display: flex; align-items: center; gap: 9px;
}
.user-avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--accent); color: #fff; font-size: 0.7rem; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.user-name { font-size: 0.8rem; font-weight: 600; line-height: 1.2; }
.user-role { font-size: 0.68rem; color: var(--text2); }

/* MAIN */
.main-area { margin-left: 190px; flex: 1; display: flex; flex-direction: column; min-height: 100vh; }
.topbar {
  position: sticky; top: 0; z-index: 90;
  background: var(--topbar-bg); backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 0 24px; height: 56px;
  display: flex; align-items: center; justify-content: space-between;
  gap: 16px;
}
.topbar-title { font-size: 1rem; font-weight: 700; color: var(--text); }
.topbar-center { font-size: 0.78rem; color: var(--text2); text-align: center; line-height: 1.4; }
.topbar-right { display: flex; align-items: center; gap: 10px; }
.theme-toggle {
  width: 34px; height: 34px; border-radius: 8px; border: 1px solid var(--border);
  background: var(--card); color: var(--text2); display: flex; align-items: center; justify-content: center;
  font-size: 1rem; transition: all var(--transition);
}
.theme-toggle:hover { background: var(--hover-bg); color: var(--text); }
.page-content { flex: 1; padding: 24px; max-width: 1200px; }

/* ===== COMPONENTS ===== */
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: var(--radius); font-size: 0.82rem; font-weight: 600; border: none; transition: all var(--transition); cursor: pointer; }
.btn-accent { background: var(--accent); color: #fff; }
.btn-accent:hover { background: var(--accent-hover); transform: translateY(-1px); }
.btn-red { background: var(--red-dim); color: var(--red); border: 1px solid var(--red); }
.btn-red:hover { background: var(--red); color: #fff; }
.btn-ghost { background: var(--card2); color: var(--text); border: 1px solid var(--border); }
.btn-ghost:hover { background: var(--hover-bg); }
.btn-dark { background: var(--text); color: var(--bg); }
.btn-dark:hover { opacity: 0.85; }
.btn-sm { padding: 5px 12px; font-size: 0.76rem; }
.btn-lg { padding: 11px 22px; font-size: 0.9rem; width: 100%; justify-content: center; }

.card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 18px; transition: background var(--transition), border-color var(--transition); }
.card-title { font-size: 0.78rem; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text2); margin-bottom: 12px; }

.badge { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 999px; font-size: 0.68rem; font-weight: 700; white-space: nowrap; }
.badge-accent { background: var(--accent-dim); color: var(--accent); }
.badge-blue { background: var(--blue-dim); color: var(--blue); }
.badge-red { background: var(--red-dim); color: var(--red); }
.badge-amber { background: var(--amber-dim); color: var(--amber); }
.badge-purple { background: var(--purple-dim); color: var(--purple); }
.badge-gray { background: var(--card2); color: var(--text2); border: 1px solid var(--border); }
.badge-accent-outline { background: transparent; color: var(--accent); border: 1px solid var(--accent); }
.badge-blue-outline { background: transparent; color: var(--blue); border: 1px solid var(--blue); }

/* Toggle switch */
.toggle { position: relative; display: inline-block; width: 36px; height: 20px; }
.toggle input { opacity: 0; width: 0; height: 0; }
.toggle-slider { position: absolute; inset: 0; background: var(--border); border-radius: 10px; transition: background 0.2s; cursor: pointer; }
.toggle-slider::before { content: ''; position: absolute; height: 14px; width: 14px; left: 3px; bottom: 3px; background: #fff; border-radius: 50%; transition: transform 0.2s; }
.toggle input:checked + .toggle-slider { background: var(--accent); }
.toggle input:checked + .toggle-slider::before { transform: translateX(16px); }

/* Form elements */
.form-group { margin-bottom: 14px; }
.form-label { font-size: 0.78rem; font-weight: 600; color: var(--text2); margin-bottom: 5px; display: block; }
.form-input, .form-select, .form-textarea {
  width: 100%; background: var(--input-bg); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 9px 12px; color: var(--text);
  font-size: 0.84rem; transition: border-color var(--transition);
  -webkit-appearance: none;
}
.form-input:focus, .form-select:focus, .form-textarea:focus { outline: none; border-color: var(--accent); }
.form-textarea { resize: vertical; min-height: 72px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.form-error { font-size: 0.72rem; color: var(--red); margin-top: 4px; display: none; }
.form-error.show { display: block; }
.radio-group { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 4px; }
.radio-label { display: flex; align-items: center; gap: 6px; cursor: pointer; font-size: 0.82rem; }
.radio-label input { accent-color: var(--accent); }

/* MODAL */
.modal-overlay {
  position: fixed; inset: 0; background: var(--overlay); z-index: 1000;
  display: none; align-items: center; justify-content: center; padding: 20px;
}
.modal-overlay.open { display: flex; animation: fadeIn 0.15s ease; }
.modal {
  background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-lg);
  width: 100%; max-width: 480px; max-height: 90vh; overflow-y: auto;
  animation: slideUp 0.2s ease;
}
.modal-header { display: flex; align-items: center; justify-content: space-between; padding: 18px 20px 14px; border-bottom: 1px solid var(--border); }
.modal-title { font-size: 0.95rem; font-weight: 700; }
.modal-close { width: 28px; height: 28px; border-radius: 6px; border: none; background: var(--card2); color: var(--text2); font-size: 1rem; display: flex; align-items: center; justify-content: center; cursor: pointer; }
.modal-body { padding: 18px 20px; }
.modal-footer { display: flex; gap: 10px; justify-content: flex-end; padding: 14px 20px; border-top: 1px solid var(--border); }

/* TOAST */
.toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 2000; display: flex; flex-direction: column; gap: 8px; }
.toast {
  padding: 12px 18px; border-radius: var(--radius); font-size: 0.83rem; font-weight: 600;
  color: #fff; min-width: 240px; box-shadow: var(--shadow-lg);
  animation: slideInRight 0.25s ease; display: flex; align-items: center; gap: 8px;
}
.toast.success { background: var(--accent); }
.toast.error { background: var(--red); }
.toast.out { animation: slideOutRight 0.25s ease forwards; }

/* Filters tabs */
.filter-tabs { display: flex; gap: 4px; margin-bottom: 18px; flex-wrap: wrap; }
.filter-tab { padding: 6px 14px; border-radius: 999px; font-size: 0.78rem; font-weight: 600; cursor: pointer; border: 1px solid var(--border); background: var(--card2); color: var(--text2); transition: all var(--transition); }
.filter-tab.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }

/* Table */
.table-wrap { overflow-x: auto; border-radius: var(--radius-lg); border: 1px solid var(--border); }
table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
thead th { background: var(--card2); padding: 10px 14px; text-align: left; font-size: 0.7rem; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase; color: var(--text2); white-space: nowrap; }
tbody tr { border-top: 1px solid var(--border); transition: background var(--transition); cursor: pointer; }
tbody tr:hover { background: var(--hover-bg); }
tbody tr:nth-child(even) { background: var(--row-even); }
tbody tr:nth-child(even):hover { background: var(--hover-bg); }
td { padding: 11px 14px; color: var(--text); vertical-align: middle; }

/* Guest row */
.guest-row-avatar { width: 30px; height: 30px; border-radius: 50%; color: #fff; font-size: 0.62rem; font-weight: 700; display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; }
.guest-row-name { font-weight: 600; font-size: 0.84rem; }
.guest-row-email { font-size: 0.72rem; color: var(--text2); }

/* ANIMATIONS */
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
@keyframes slideInRight { from { opacity: 0; transform: translateX(40px); } to { opacity: 1; transform: translateX(0); } }
@keyframes slideOutRight { to { opacity: 0; transform: translateX(40px); } }
@keyframes spin { to { transform: rotate(360deg); } }
.spinner { width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; display: inline-block; }

/* ===== PAGE SPECIFIC ===== */

/* DASHBOARD */
.occ-banner {
  background: linear-gradient(135deg, #0f9e87, var(--accent), #23d4b5);
  border-radius: var(--radius-lg); padding: 22px 24px;
  display: flex; align-items: center; justify-content: space-between; gap: 20px; margin-bottom: 18px;
}
.occ-pct { font-size: 3rem; font-weight: 700; color: #fff; line-height: 1; letter-spacing: -0.04em; }
.occ-label { font-size: 0.7rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(255,255,255,0.8); margin-top: 3px; }
.occ-right { text-align: right; }
.occ-bar-bg { height: 8px; background: rgba(255,255,255,0.25); border-radius: 4px; width: 160px; margin: 8px 0; margin-left: auto; overflow: hidden; }
.occ-bar-fill { height: 100%; background: #fff; border-radius: 4px; width: 84.6%; }
.occ-beds { font-size: 0.9rem; font-weight: 700; color: #fff; }
.occ-avail { font-size: 0.75rem; color: rgba(255,255,255,0.7); margin-top: 2px; }
.metrics-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 14px; margin-bottom: 18px; }
.metric-card {
  background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 16px;
  cursor: pointer; transition: transform var(--transition), box-shadow var(--transition);
}
.metric-card:hover { transform: translateY(-2px); box-shadow: var(--shadow); }
.metric-num { font-size: 1.8rem; font-weight: 700; letter-spacing: -0.04em; line-height: 1; }
.metric-label { font-size: 0.65rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text2); margin-top: 4px; }
.metric-delta { font-size: 0.72rem; color: var(--text2); margin-top: 6px; }
.action-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 18px; }
.action-btn-checkin { background: var(--accent); color: #fff; border: none; border-radius: var(--radius); padding: 12px; font-size: 0.88rem; font-weight: 700; cursor: pointer; transition: all var(--transition); }
.action-btn-checkin:hover { background: var(--accent-hover); }
.action-btn-checkout { background: var(--red-dim); color: var(--red); border: 1px solid var(--red); border-radius: var(--radius); padding: 12px; font-size: 0.88rem; font-weight: 700; cursor: pointer; transition: all var(--transition); }
.action-btn-checkout:hover { background: var(--red); color: #fff; }
.dash-panels { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
.panel-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.panel-title { font-size: 0.82rem; font-weight: 700; color: var(--text); }
.panel-link { font-size: 0.76rem; color: var(--accent); cursor: pointer; font-weight: 600; }
.panel-link:hover { text-decoration: underline; }
.guest-item { display: flex; align-items: center; gap: 10px; padding: 9px 0; border-bottom: 1px solid var(--border); cursor: pointer; transition: background var(--transition); border-radius: 6px; padding-left: 6px; padding-right: 6px; }
.guest-item:last-child { border-bottom: none; }
.guest-item:hover { background: var(--hover-bg); }
.guest-item-info { flex: 1; min-width: 0; }
.guest-item-name { font-size: 0.84rem; font-weight: 600; }
.guest-item-sub { font-size: 0.72rem; color: var(--text2); }
.caja-methods { display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px; }
.caja-method-row { display: flex; justify-content: space-between; align-items: center; }
.caja-method-label { font-size: 0.82rem; color: var(--text2); display: flex; align-items: center; gap: 6px; }
.caja-method-val { font-size: 0.88rem; font-weight: 700; color: var(--accent); }
.caja-total-row { display: flex; justify-content: space-between; align-items: center; padding-top: 10px; border-top: 1px solid var(--border); }
.caja-total-label { font-size: 0.84rem; font-weight: 700; }
.caja-total-val { font-size: 1.1rem; font-weight: 700; color: var(--amber); }

/* RESERVAS */
.search-input-wrap { position: relative; margin-bottom: 16px; }
.search-input-wrap input { padding-left: 34px; }
.search-icon { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--text2); font-size: 0.9rem; }

/* CHECK-IN FORM */
.checkin-form { max-width: 620px; }

/* Payment section styles */
.payment-section { background: var(--card2); border-radius: var(--radius); padding: 14px; margin-top: 12px; }
.payment-option { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.payment-option:last-child { margin-bottom: 0; }
.pending-amount { color: var(--red); font-weight: 700; font-size: 1.1rem; margin-top: 8px; }
.boleta-upload { border: 2px dashed var(--border); border-radius: var(--radius); padding: 16px; text-align: center; cursor: pointer; transition: all var(--transition); }
.boleta-upload:hover { border-color: var(--accent); background: var(--accent-dim); }
.boleta-preview { max-width: 100%; max-height: 150px; border-radius: var(--radius); margin-top: 10px; }

/* CAJA */
.caja-banner {
  background: linear-gradient(135deg, #1c1c1c, #252525);
  border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 22px 24px;
  display: flex; align-items: center; justify-content: space-between; gap: 16px; margin-bottom: 20px;
}
[data-theme="light"] .caja-banner { background: linear-gradient(135deg, #2a2a2a, #333); }
.caja-banner-left .caja-shift-tag { font-size: 0.65rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text2); margin-bottom: 4px; }
.caja-banner-left h2 { font-size: 1.2rem; font-weight: 700; color: #fff; }
.caja-banner-left p { font-size: 0.76rem; color: rgba(255,255,255,0.5); margin-top: 3px; }
.caja-banner-right { text-align: right; }
.caja-total-big { font-size: 2.4rem; font-weight: 700; color: var(--amber); letter-spacing: -0.04em; line-height: 1; }
.caja-breakdown { font-size: 0.72rem; color: rgba(255,255,255,0.4); margin-top: 4px; font-family: var(--mono); }
.caja-panels { display: grid; grid-template-columns: 280px 1fr; gap: 18px; }
.mov-item { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); }
.mov-item:last-child { border-bottom: none; }
.mov-icon { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 0.85rem; flex-shrink: 0; }
.mov-icon.ingreso { background: var(--accent-dim); }
.mov-icon.egreso { background: var(--red-dim); }
.mov-info { flex: 1; min-width: 0; }
.mov-desc { font-size: 0.82rem; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.mov-meta { font-size: 0.7rem; color: var(--text2); }
.mov-amount { font-size: 0.88rem; font-weight: 700; white-space: nowrap; }
.mov-amount.ingreso { color: var(--accent); }
.mov-amount.egreso { color: var(--red); }

/* Caja volunteer view */
.caja-volunteer { max-width: 500px; }
.caja-opening-form { background: var(--card2); border-radius: var(--radius-lg); padding: 20px; margin-bottom: 20px; }
.caja-volunteer-simple { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 20px; }
.caja-current-amount { font-size: 2rem; font-weight: 700; color: var(--amber); text-align: center; margin-bottom: 20px; }

/* TASKS */
.task-item { display: flex; align-items: flex-start; gap: 12px; padding: 12px 14px; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 8px; transition: all var(--transition); position: relative; }
.task-item.done { opacity: 0.55; }
.task-checkbox { width: 20px; height: 20px; border-radius: 50%; border: 2px solid var(--border); cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all var(--transition); margin-top: 2px; }
.task-checkbox.checked { background: var(--accent); border-color: var(--accent); color: #fff; }
.task-info { flex: 1; min-width: 0; }
.task-title { font-size: 0.84rem; font-weight: 600; margin-bottom: 3px; }
.task-item.done .task-title { text-decoration: line-through; }
.task-sub { font-size: 0.72rem; color: var(--text2); }
.task-menu-btn { padding: 4px 8px; background: none; border: none; color: var(--text2); font-size: 1rem; border-radius: 6px; opacity: 0; transition: all var(--transition); }
.task-item:hover .task-menu-btn { opacity: 1; }
.task-menu-dropdown { position: absolute; right: 10px; top: 36px; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); z-index: 50; min-width: 110px; box-shadow: var(--shadow-lg); }
.task-menu-opt { padding: 9px 14px; font-size: 0.8rem; cursor: pointer; transition: background var(--transition); }

// ===== THEME =====
function toggleTheme() {
  const cur = document.documentElement.dataset.theme;
  const next = cur === 'dark' ? 'light' : 'dark';
  document.documentElement.dataset.theme = next;
  localStorage.setItem('zuquix-theme', next);
  document.getElementById('theme-btn').textContent = next === 'dark' ? '🌙' : '☀️';
  if(currentPage === 'finanzas') { Object.values(chartInstances).forEach(c => c.destroy()); chartInstances = {}; renderFinanzas(); }
}
(function initTheme() {
  const saved = localStorage.getItem('zuquix-theme') || 'dark';
  document.documentElement.dataset.theme = saved;
  document.getElementById('theme-btn').textContent = saved === 'dark' ? '🌙' : '☀️';
})();

// ===== USER ROLE MANAGEMENT =====
function switchUserRole(role) {
  currentUser.role = role;
  const name = role === 'admin' ? 'Rodrigo Castro' : 'Voluntario';
  const initials = role === 'admin' ? 'RC' : 'V';
  currentUser.name = name;
  currentUser.initials = initials;
  
  document.getElementById('sidebar-name').textContent = name;
  document.getElementById('sidebar-role').textContent = role === 'admin' ? 'Admin' : 'Voluntario';
  document.getElementById('sidebar-avatar').textContent = initials;
  document.getElementById('mobile-avatar').textContent = initials;
  
  if(currentPage === 'caja') renderCaja();
}

// ===== TOPBAR DATE =====
(function updateDate() {
  const el = document.getElementById('topbar-date');
  if(!el) return;
  const d = new Intl.DateTimeFormat('es-PA',{weekday:'long',day:'numeric',month:'long',timeZone:'America/Panama'}).format(new Date());
  el.innerHTML = `<div>${d.charAt(0).toUpperCase()+d.slice(1)}</div><div>Turno mañana · ${currentUser.name}</div>`;
})();

// ===== TOAST =====
function showToast(msg, type='success') {
  const c = document.getElementById('toast-container');
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.innerHTML = (type==='success'?'✓ ':type==='error'?'✕ ':'')+msg;
  c.appendChild(t);
  setTimeout(()=>{ t.classList.add('out'); setTimeout(()=>t.remove(),300); }, 3000);
}

// ===== MODAL =====
function openModal(title, bodyHTML, footerHTML='') {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = bodyHTML;
  document.getElementById('modal-footer').innerHTML = footerHTML;
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }
function closeModalOnOverlay(e) { if(e.target === document.getElementById('modal-overlay')) closeModal(); }
document.addEventListener('keydown', e => { if(e.key==='Escape') { closeModal(); closeMoreSheet(); } });

// ===== BOTTOM SHEET =====
function openMoreSheet() {
  document.getElementById('sheet-overlay').classList.add('open');
  document.getElementById('bottom-sheet').classList.add('open');
}
function closeMoreSheet() {
  document.getElementById('sheet-overlay').classList.remove('open');
  document.getElementById('bottom-sheet').classList.remove('open');
}

// ===== STATUS HELPERS =====
function statusBadge(s) {
  const m = {
    'checkin-hoy':'<span class="badge badge-blue">Check-in hoy</span>',
    'sale-hoy':'<span class="badge badge-amber">Sale hoy</span>',
    'in-house':'<span class="badge badge-accent">In-house</span>',
    'confirmada':'<span class="badge badge-accent-outline">Confirmada</span>',
    'booking':'<span class="badge badge-blue-outline">Booking.com</span>',
    'pago-pendiente':'<span class="badge badge-red">Pago pendiente</span>',
    'checked-out':'<span class="badge badge-gray">Checked-out</span>'
  };
  return m[s]||`<span class="badge badge-gray">${s}</span>`;
}
function priorityBadge(p) {
  if(p==='urgente') return '<span class="badge badge-red">Urgente</span>';
  if(p==='medio') return '<span class="badge badge-amber">Medio</span>';
  if(p==='hecho') return '<span class="badge badge-accent">Hecho</span>';
  return `<span class="badge badge-gray">${p}</span>`;
}

function filterByTab(list) {
  if(reservasFilter==='hoy') return list.filter(g=>['checkin-hoy','sale-hoy'].includes(g.status));
  if(reservasFilter==='checkin') return list.filter(g=>g.status==='checkin-hoy');
  if(reservasFilter==='checkout') return list.filter(g=>g.status==='sale-hoy');
  return list;
}
function filterReservas(val) {
  reservasSearch = val;
  document.getElementById('reservas-table-wrap').innerHTML = renderReservasTable();
}
function setReservasFilter(f) {
  reservasFilter = f;
  renderReservas();
}
function renderReservasTable() {
  let list = filterByTab(guests);
  if(reservasSearch) list = list.filter(g=>g.name.toLowerCase().includes(reservasSearch.toLowerCase())||g.room.toLowerCase().includes(reservasSearch.toLowerCase()));

function updateEditPending(id) {
  const g = guests.find(x=>x.id===id);
  const total = parseFloat(document.getElementById('edit-total').value) || 0;
  const tax = parseFloat(document.getElementById('edit-tax').value) || 0;
  const paid = parseFloat(document.getElementById('edit-paid').value) || 0;
  const pending = total + tax - paid;
  document.getElementById('edit-pending-display').innerHTML = `Pendiente: <span style="color:var(--red)">$${pending}</span>`;
}

function toggleEditPaymentType() {
  // Logic handled in save
}

function saveEditReservation(id) {
  const g = guests.find(x=>x.id===id);
  if(!g) return;
  
  g.name = document.getElementById('edit-name').value;
  g.email = document.getElementById('edit-email').value;
  g.checkin = document.getElementById('edit-checkin').value;
  g.checkout = document.getElementById('edit-checkout').value;
  g.total = parseFloat(document.getElementById('edit-total').value) || 0;
  g.tax = parseFloat(document.getElementById('edit-tax').value) || 0;
  g.paidAmount = parseFloat(document.getElementById('edit-paid').value) || 0;
  g.paymentType = document.querySelector('input[name="edit-payment-type"]:checked')?.value || 'pendiente';
  g.pendingAmount = g.total + g.tax - g.paidAmount;
  
  closeModal();
  showToast('✓ Reserva actualizada correctamente');
  renderReservas();
}

function openPaymentModal(id) {
  const g = guests.find(x=>x.id===id);
  if(!g) return;
  
  openModal('Registrar pago - ' + g.name,
    `<div style="text-align:center;margin-bottom:16px;">
      <div style="font-size:0.8rem;color:var(--text2);margin-bottom:4px;">Monto pendiente</div>
      <div style="font-size:1.8rem;font-weight:700;color:var(--red);">$${g.pendingAmount}</div>
    </div>
    <div class="form-group">
      <label class="form-label">Monto a pagar *</label>
      <input class="form-input" id="payment-amount" type="number" max="${g.pendingAmount}" value="${g.pendingAmount}">
    </div>
    <div class="form-group">
      <label class="form-label">Método de pago</label>
      <select class="form-select" id="payment-method">
        <option value="Efectivo">Efectivo</option>
        <option value="Tarjeta">Tarjeta</option>
        <option value="Transferencia">Transferencia</option>
      </select>
    </div>`,
    `<button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
     <button class="btn btn-accent" onclick="processPayment(${g.id})">Registrar pago</button>`
  );
}

function processPayment(id) {
  const g = guests.find(x=>x.id===id);
  if(!g) return;
  
  const amount = parseFloat(document.getElementById('payment-amount').value) || 0;
  const method = document.getElementById('payment-method').value;
  
  if(amount <= 0 || amount > g.pendingAmount) {
    showToast('Monto inválido', 'error');
    return;
  }
  
  g.paidAmount += amount;
  g.pendingAmount = g.total + g.tax - g.paidAmount;
  g.paymentMethod = method;
  
  if(g.pendingAmount <= 0) {
    g.paymentType = 'completo';
  } else {
    g.paymentType = 'adelanto';
  }
  
  // Registrar en movimientos
  movements.unshift({
    date: new Date().toLocaleDateString('es-PA') + ' ' + new Date().toLocaleTimeString('es-PA',{hour:'2-digit',minute:'2-digit'}),
    desc: `Pago ${g.name} - ${g.room}`,
    type: 'ingreso',
    method: method,
    amount: amount,
    category: 'reserva'
  });
  
  closeModal();
  showToast(`✓ Pago de $${amount} registrado`);
  renderReservas();
}

function updateRoomOptions() {
  const type = document.getElementById('ci-type').value;
  const roomSel = document.getElementById('ci-room');
  const bedGroup = document.getElementById('ci-bed-group');
  const rate = document.getElementById('ci-rate');
  if(type==='privada') {
    roomSel.innerHTML = [1,2,3,4,5,6,7,8].map(n=>`<option>Habitación ${n}</option>`).join('');
    bedGroup.style.display='none';
    rate.value=45;
  } else if(type==='compartida') {
    roomSel.innerHTML = ['Dormitorio A','Dormitorio B','Dormitorio C'].map(r=>`<option>${r}</option>`).join('');
    bedGroup.style.display='';
    rate.value=15;
  } else {
    roomSel.innerHTML='<option>Selecciona tipo primero</option>';
    bedGroup.style.display='none';
  }
  calcNights();
}
function calcNights() {
  const ci=document.getElementById('ci-checkin').value;
  const co=document.getElementById('ci-checkout').value;
  const rate=parseFloat(document.getElementById('ci-rate').value)||0;
  const tax=parseFloat(document.getElementById('ci-tax').value)||0;
  if(ci&&co){
    const d=(new Date(co)-new Date(ci))/(86400000);
    if(d>0){
      document.getElementById('ci-nights').value=d+' noche'+(d>1?'s':'');
      const subtotal = d*rate;
      document.getElementById('ci-total').value='$'+(subtotal+tax).toFixed(2);
      calcPending();
    } else {
      document.getElementById('ci-nights').value='';
      document.getElementById('ci-total').value='';
    }
  }
}

function togglePaymentType() {
  const isAdelanto = document.getElementById('pay-adelanto').checked;
  document.getElementById('adelanto-input').style.display = isAdelanto ? 'block' : 'none';
  document.getElementById('pending-display').style.display = isAdelanto ? 'block' : 'none';
  calcPending();
}

function calcPending() {
  const totalText = document.getElementById('ci-total').value || '$0';
  const total = parseFloat(totalText.replace('$','')) || 0;
  const adelanto = parseFloat(document.getElementById('ci-adelanto-amount').value) || 0;
  const pending = total - adelanto;
  if(pending >= 0) {
    document.getElementById('pending-display').innerHTML = `Pago pendiente: <span style="color:var(--red);font-weight:700;">$${pending.toFixed(2)}</span>`;
  }
}

function handleBoletaUpload(input) {
  if(input.files && input.files[0]) {
    const reader = new FileReader();
    reader.onload = function(e) {
      boletaFile = e.target.result;
      document.getElementById('boleta-preview').src = boletaFile;
      document.getElementById('boleta-preview').style.display = 'block';
      document.getElementById('boleta-text').textContent = '✓ Boleta cargada';
    };
    reader.readAsDataURL(input.files[0]);
  }
}

function submitCheckin() {
  let valid=true;
  function req(id,errId){ const v=document.getElementById(id).value; if(!v){ document.getElementById(errId).classList.add('show'); valid=false; } else { document.getElementById(errId).classList.remove('show'); } return v; }
  const name=req('ci-name','err-name');
  const type=req('ci-type','err-type');
  const room=req('ci-room','err-room');
  const ci=req('ci-checkin','err-checkin');
  const co=req('ci-checkout','err-checkout');
  if(!valid) return;
  const nights=parseInt((document.getElementById('ci-nights').value||'1'));
  const rate=parseFloat(document.getElementById('ci-rate').value)||0;
  const tax=parseFloat(document.getElementById('ci-tax').value)||0;
  const total=(nights*rate)+tax;
  const bed=document.getElementById('ci-bed')?.value||'';
  const paymentMethod=document.querySelector('input[name="ci-payment"]:checked')?.value||'Efectivo';
  const paymentType = document.querySelector('input[name="ci-payment-type"]:checked')?.value || 'completo';
  let paidAmount = total;
  let pendingAmount = 0;
  
  if(paymentType === 'adelanto') {
    paidAmount = parseFloat(document.getElementById('ci-adelanto-amount').value) || 0;
    pendingAmount = total - paidAmount;
  }
  
  const newGuest={id:Date.now(),name,email:document.getElementById('ci-email').value,room,bed,checkin:ci,checkout:co,nights:nights||1,total,tax,status:'checkin-hoy',avatar:name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase(),color:'#1ABDA0',paidAmount,pendingAmount,paymentType,paymentMethod,boleta:boletaFile};
  guests.push(newGuest);
  movements.unshift({date:new Date().toLocaleDateString('es-PA')+ ' ' + new Date().toLocaleTimeString('es-PA',{hour:'2-digit',minute:'2-digit'}),desc:`Check-in ${name} — ${room}`,type:'ingreso',method:paymentMethod,amount:paidAmount,category:'reserva'});
  
  // Si hay pago pendiente, agregar a tareas de lavandería si aplica
  if(pendingAmount > 0 && room.includes('Dorm')) {
    tasks.push({
      id: Date.now(),
      title: `Lavandería - ${name}`,
      assigned: "Sin asignar",
      time: "09:00 AM",
      location: room,
      priority: "medio",
      done: false,
      type: "laundry",
      guestName: name,
      amount: 5,
      room: room
    });
  }
  
  showToast('✓ Check-in registrado correctamente');
  boletaFile = null;
  renderCheckin();
}

function updateCajaAmount() {
  const newAmount = parseFloat(document.getElementById('caja-update-amount').value);
  if(isNaN(newAmount)) {
    showToast('Ingresa un monto válido', 'error');
    return;
  }
  
  const currentEfectivo = movements
    .filter(m => m.method === 'Efectivo')
    .reduce((s, m) => s + (m.type === 'ingreso' ? m.amount : -m.amount), 0);
  
  const difference = newAmount - currentEfectivo;
  
  if(difference !== 0) {
    const type = difference > 0 ? 'ingreso' : 'egreso';
    movements.unshift({
      date: new Date().toLocaleDateString('es-PA') + ' ' + new Date().toLocaleTimeString('es-PA',{hour:'2-digit',minute:'2-digit'}),
      desc: `Actualización de caja - Ajuste ${type === 'ingreso' ? 'positivo' : 'negativo'}`,
      type: type,
      method: 'Efectivo',
      amount: Math.abs(difference),
      category: 'ajuste'
    });
    
    showToast(`✓ Caja actualizada. ${type === 'ingreso' ? 'Ingreso' : 'Egreso'} registrado: $${Math.abs(difference)}`);
  } else {
    showToast('No hay diferencia para ajustar');
  }
  
  document.getElementById('caja-update-amount').value = '';
  renderCaja();
}

function saveTask(id) {
  const title=document.getElementById('tk-title').value;
  if(!title){ showToast('El título es requerido','error'); return; }
  const type = document.getElementById('tk-type').value;
  const newTask = {
    id: id&&id!=='null' ? id : Date.now(),
    title,
    assigned:document.getElementById('tk-assign').value,
    time:document.getElementById('tk-time').value,
    location:document.getElementById('tk-loc').value,
    type: type,
    priority:document.getElementById('tk-priority').value,
    done: id&&id!=='null' ? tasks.find(t=>t.id===id)?.done : false
  };
  
  if(type === 'laundry') {
    newTask.guestName = document.getElementById('tk-guest').value;
    newTask.amount = parseFloat(document.getElementById('tk-amount').value) || 0;
  }
  
  if(id&&id!=='null') {
    const idx = tasks.findIndex(t=>t.id===id);
    if(idx >= 0) tasks[idx] = {...tasks[idx], ...newTask};

    tasks.push(newTask);

}

function generateReport(idx, title) {
  const from=document.getElementById(`rpt-from-${idx}`).value;
  const to=document.getElementById(`rpt-to-${idx}`).value;
  if(!from||!to){ showToast('Selecciona el rango de fechas','error'); return; }
  let content=`ZUQUIX PMS — Bocas del Toro\n${'='.repeat(40)}\nReporte: ${title}\nFecha: ${from} a ${to}\nGenerado: ${new Date().toLocaleString('es-PA')}\n\n`;
  if(idx===0) {
    content+='OCUPACIÓN:\n';
    content+=`Total camas: 26 | Ocupadas: 22 | Disponibles: 4 | Ocupación: 84%\n\nHabitaciones privadas (1-8): ver detalle por room\nDormitorio A (6 camas), B (6 camas), C (6 camas)\n`;
  } else if(idx===1) {
    content+='INGRESOS POR TURNO:\n';
    movements.filter(m=>m.type==='ingreso').forEach(m=>{ content+=`${m.date} | ${m.method} | +$${m.amount} | ${m.desc}\n`; });
    content+=`\nTotal ingresos: $${movements.filter(m=>m.type==='ingreso').reduce((s,m)=>s+m.amount,0)}\n`;
  } else {
    content+='HISTORIAL DE HUÉSPEDES:\n';
    guests.forEach(g=>{ content+=`${g.name} | ${g.room} | ${g.checkin} → ${g.checkout} | ${g.nights}n | $${g.total} | Pendiente: $${g.pendingAmount} | ${g.status}\n`; });
  }
  const blob=new Blob([content],{type:'text/plain'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=`reporte-${title.replace(/\s/g,'-').toLowerCase()}.txt`; a.click();
  showToast('✓ Reporte generado y descargado');
}

// ===== INIT =====
navigate('dashboard');
</script>
</body>
</html>
